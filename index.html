    <!-- Auto-redirect based on browser language -->
    <script>
        (function() {
            var lang = (navigator.language || navigator.userLanguage || '').toLowerCase().substring(0, 2);
            if (lang === 'it') {
                window.location.replace('it/');
            } else if (lang === 'fr') {
                window.location.replace('fr/');
            } else {
                window.location.replace('en/');
            }
        })();
    </script>
